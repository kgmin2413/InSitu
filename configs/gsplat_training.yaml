preset: gsplat
intermediate_dir: data/intermediate

frame_extraction:
  target_fps: 1
  max_frames: 24
  blur_threshold: 20.0
  duplicate_threshold: 3.0
  output_ext: png

background_removal:
  backend: opencv_grabcut
  grabcut_iterations: 2
  rect_margin_ratio: 0.08
  max_processing_side: 384

marker_detection:
  enabled: false
  dictionary: DICT_4X4_50
  marker_ids: [23]
  marker_size_m: 0.12
  max_images: 60
  require_detection: false

colmap:
  enabled: true
  matcher: sequential
  camera_model: SIMPLE_RADIAL
  single_camera: true
  use_gpu: false
  timeout_sec: 900
  quality:
    min_registered_images: 12
    min_registered_ratio: 0.25
    min_sparse_points: 300
    max_reprojection_error: 2.0
    fail_on_low_quality: true

training:
  enabled: true
  iterations: 7000
  timeout_sec: 14400
  model_dir_name: 3dgs_gsplat
  expected_point_cloud: point_cloud/iteration_{iterations}/point_cloud.ply
  command:
    - python
    - scripts/train_gsplat_adapter.py
    - --gsplat_repo
    - third_party/gsplat
    - --images_dir
    - "{images_dir}"
    - --sparse_model_dir
    - "{sparse_model_dir}"
    - --model_dir
    - "{model_dir}"
    - --iterations
    - "{iterations}"
    - --data_factor
    - "1"
    - --timeout_sec
    - "14400"

scale_estimation:
  method: manual
  source: training_point_cloud
  scale_factor: 1.0

proxy_generation:
  method: obb
  voxel_size_m: 0.01
  percentile_filter:
    enabled: true
    lower: 1.0
    upper: 99.0
  statistical_filter:
    enabled: true
    neighbors: 12
    std_ratio: 2.0
  cluster_filter:
    enabled: false
    eps: 0.08
    min_samples: 8
  flat_bottom:
    enabled: false
    up_axis: Y
